name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: fmt, clippy, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starkc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: starkc
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  fixture-conformance:
    name: spec fixture conformance
    runs-on: ubuntu-latest
    # Required-green since WP1.4 (PLAN.md: Gate 1 exit criterion).
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: starkc
      - name: Fixture extraction is in sync with the spec
        run: |
          STARKLANG/tools/extract-spec-examples.sh /tmp/fixtures-check > /dev/null
          # manifest.toml (WP1.3 triage) is hand-maintained, not extracted
          diff -r --exclude=manifest.toml STARKLANG/tests/spec-fixtures /tmp/fixtures-check
      - name: Manifest-driven spec conformance
        run: |
          cd starkc
          cargo test --test conformance
