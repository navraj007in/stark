# STARK Core v1 spec-fixture manifest (WP1.3 triage).
#
# Every fixture extracted by tools/extract-spec-examples.sh has exactly one
# entry here. The extraction script fails if this list diverges from the
# extracted set (spec edits that add/renumber blocks force a re-triage), and
# starkc/tests/conformance.rs enforces the verdicts.
#
# Schema (deliberately a flat TOML subset so a dependency-free test harness
# can parse it):
#   ["<fixture file name>"]
#   verdict = "parse-pass" | "parse-fail" | "semantic-error" | "lex-pass"
#           | "notation"
#   mode    = "program" | "snippet"      # required for parse-* / semantic-error
#   errors  = "E0001,E0005"              # semantic-error only: expected codes
#   note    = "free text"                # optional
#
# Verdicts:
#   parse-pass     — must lex and parse cleanly under `mode`.
#   parse-fail     — must be rejected by the lexer or parser (negative test).
#   semantic-error — must lex and parse cleanly; Gate 2 must report the codes
#                    in `errors` (recorded now, enforced by the Gate 2
#                    harness). Codes caused only by standalone extraction
#                    (undefined helper names) are noted, not listed.
#   lex-pass       — token-level example; must lex cleanly, is not a program.
#   notation       — API listings / type catalogs / typing-rule metavariables
#                    per 06-Standard-Library.md "Notation"; excluded from
#                    parsing.
#
# Modes:
#   program — parsed as Program ::= Item*  (02-Syntax-Grammar.md).
#   snippet — parsed as a block body: (Item | Statement)* Expression?. This is
#             a harness-only convenience for spec examples written at
#             "statement level"; it is not a source-language entry point.
#
# Verdict census (keep in sync when re-triaging):
#   parse-pass 56, semantic-error 16, notation 27, lex-pass 4, parse-fail 1
#   = 104 fixtures.

