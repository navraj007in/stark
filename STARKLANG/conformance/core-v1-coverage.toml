# STARKLANG Core v1 Specification Rules Coverage Database
#
# Schema per [[rule]] entry:
#   id          — stable rule identifier (e.g. "LEX-003").
#   chapter     — spec chapter file stem under STARKLANG/docs/spec/ (no ".md").
#   description — free text.
#   status      — implemented | partial | missing | intentionally-deferred | spec-defect.
#   source      — path to the primary implementing source file (required if status=implemented).
#   tests       — legacy, file-level evidence list (required if status=implemented). Does not
#                 distinguish positive (valid-program) from negative (invalid-program/rejection)
#                 coverage, and often cites only the aggregate `starkc/tests/conformance.rs`
#                 fixture-corpus runner with no per-rule attribution within it -- this was
#                 DEV-017's finding.
#   positive_tests / negative_tests — WP-C1.6 addition, optional. Each entry is either a bare
#                 file path (validated for existence, same as `tests`) or `path::function_name`
#                 (also validated that `fn function_name` exists in that file --
#                 check-conformance.py catches a renamed/deleted test, not just a
#                 renamed/deleted file). Omit both fields entirely for a rule that has not yet
#                 been re-cited at this precision (most rules, as of WP-C1.6 -- see DEV-017);
#                 `starkc/scripts/generate-conformance-report.py` reports those as
#                 "unclassified", not as if they had zero coverage. An empty array (`[]`) means
#                 the opposite: this rule genuinely has no evidence in that category, checked and
#                 confirmed absent, not merely unclassified.
#   deviation   — optional DEV-NNN id, when this rule's current behavior is tracked as a known
#                 deviation in COMPILER-STATE.md / starkc/docs/conformance/KNOWN-DEVIATIONS.md.
#
# `starkc/scripts/check-conformance.py` validates this file's internal consistency (duplicate
# ids, dangling chapter/path references, schema completeness). `starkc/scripts/
# generate-conformance-report.py` (WP-C1.6) emits the full per-rule evidence report (rule id,
# chapter, status, source, positive/negative tests, deviation, last-verified commit) in JSON or
# Markdown; both are run in CI (`.github/workflows/ci.yml`'s `fixture-conformance` job).

