[[rule]]
id = "PKG-002"
chapter = "07-Modules-and-Packages"
description = "Path navigation (self, super, and crate navigation rules)"
# WP-C1.2 (2026-07-17): before this WP, `super::`/`self::` had zero test evidence anywhere in
# the suite (only `crate::` had happy-path coverage) -- including the E0203 "no parent module
# for super" diagnostic, a real code path that had never actually been exercised. Added tests
# for: super:: from root (E0203), super::/crate:: navigating correctly from a nested module,
# and undeclared-dependency-import rejection (checklist item 8, package-level path resolution).
status = "implemented"
source = "starkc/src/resolve.rs"
tests = ["starkc/tests/conformance.rs", "starkc/src/resolve.rs", "starkc/tests/gate2_package.rs"]
positive_tests = ["starkc/src/resolve.rs::super_and_crate_navigate_correctly_from_a_nested_module"]
negative_tests = ["starkc/src/resolve.rs::super_from_root_module_reports_e0203_not_a_panic"]

[[rule]]
id = "PKG-003"
chapter = "07-Modules-and-Packages"
description = "Visibility boundaries (restricting access to private items)"
# WP-C1.2 (2026-07-17): added explicit-use-collision, use-vs-declared-item-collision, pub-use
# single/multi-level re-export, and pub-use-of-private-item tests (the latter two were entirely
# unrepresented: real dedicated `reexport_vis` machinery in resolve.rs had zero test coverage of
