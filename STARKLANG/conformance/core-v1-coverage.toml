[[rule]]
id = "LEX-003"
chapter = "01-Lexical-Grammar"
description = "Integer Literals (decimal, hex, octal, binary, underscores as digit separators, suffixes)"
# WP-C1.1 (2026-07-17): this rule's own description is lexical *shape* only (digit/base/
# separator/suffix syntax), which is implemented and now more thoroughly tested (underscore
# rules were decimal/hex-only before this WP; still not binary/octal -- see follow-up). Separate,
# unresolved finding made while auditing this rule: no stage in the pipeline checks a suffixed
# literal's *magnitude* against its suffix's representable range (confirmed empirically --
# `let x: UInt8 = 300u8;` compiles and checks clean end-to-end). No normative rule in this
# database currently represents that check at all -- it is not a status error on LEX-003 itself
# (out of this rule's stated scope), but a gap in what the database can represent. See
# COMPILER-STATE.md DEV-015 and starkc/docs/conformance/KNOWN-DEVIATIONS.md.
status = "implemented"
source = "starkc/src/lexer.rs"
tests = ["starkc/src/lexer.rs", "starkc/tests/conformance.rs"]
positive_tests = ["starkc/src/lexer.rs::spec_integer_examples"]
negative_tests = ["starkc/src/lexer.rs::underscore_rules", "starkc/src/lexer.rs::invalid_suffixes_and_bodies"]
deviation = "DEV-015"

