# STARK execution-snapshot corpus lock (WP-C3-ENTRY, CD-025).
# Freezes the differential/execution snapshot corpus for gate reference.
# Format: header 'key = value' lines, then one 'sha256  relative/path' line per corpus
# file (every .stark and .snap, including metamorphic/), sorted by path. This file itself
# and any non-.stark/.snap file are excluded by construction. Regenerating a corpus file
# WITHOUT bumping corpus_version is a freeze violation (see WP-C3-ENTRY.md); the integrity
# test 'corpus_lock_matches_frozen_snapshot' in exec_snapshots.rs enforces this.
#
# corpus_version 1.1.0 (WP-C4.7-9, 2026-07-20): five cases for the Class-A / WP-C4.7 constructs.
# corpus_version 1.2.0 (WP-C4.7 post-exit-report, 2026-07-20, CD-039): completes the compact
# refresh to the six workloads the owner specified — adds a MULTI-FILE case (cross-file structs,
# methods, trait default + override, a cross-file Drop, and source provenance; its `helper.stark`
# is a corpus FILE but not a CASE, having no `main`) and extends the array/slice case with
# DEV-086's consuming array pattern over droppable elements. All 1.0.0 hashes remain unchanged.
# corpus_version 1.3.0 (WP-C5.3e, 2026-07-23, CD-067/CD-069): RE-PIN, not new coverage. The
# layout-query lines of option_result__03_box_and_layout_queries recorded the pre-contract
# placeholder — size_of::<Int32>() = 8, align_of::<Bool>() = 8 — from when every consumer answered
# one machine word for every type. Under the named target contract `stark-64-v1` they are 4 and 1.
# Exactly one file changes and exactly two output lines within it; every other 1.0.0/1.1.0/1.2.0
# hash is unchanged, so the original baseline survives byte-identically everywhere else. MIR
# amendment A4 predicted this re-pin as the cost of its option (b).
# corpus_version 1.4.0 (WP-C5.6, 2026-07-23, CD-076): adds two exact C5-native cases for the
# carried-forward cross-backend replay requirement: one comprehensive normal completion and one
# deterministic integer-overflow trap. All 1.3.0 hashes remain unchanged.
