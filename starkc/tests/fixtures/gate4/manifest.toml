# Gate 4 tensor-extension fixture manifest.
#
# Classifies the Gate 4 fixture cases by expected outcome, mirroring the Core
# spec-fixture manifest convention. The parse-pass and core-reject classes are
# exercised by unit tests and the Gate 4 semantic harness. ONNX fixtures (M4.5)
# are generated deterministically by test code and recorded here as they are
# added.
#
# Classes:
#   parse-pass      parses (and AST-dumps) under `--extension tensor`
#   core-reject     rejected in Core-only mode, diagnostic naming `tensor`
#   reserved-reject rejected even under the extension (§11 reserved constructs)
#   semantic-pass   type-checks under `--extension tensor` (M4.2+)
#   semantic-error  fails extension type checking with a shape/dtype/device
#                   diagnostic (M4.2+)

[[case]]
name = "static_shape"
class = "parse-pass"
source = "let a: Tensor<Float32, [1024, 768]>;"

[[case]]
name = "symbolic_and_scalar_shapes"
class = "parse-pass"
source = "model M<B: Dim> { input x: Tensor<Float32, [B, 3, 224, 224]>; output y: Tensor<Float32, [B, 1000]>; }"

[[case]]
name = "dim_expr_arithmetic"
class = "parse-pass"
source = "let x: Tensor<Float32, [B * H + 1]>;"

[[case]]
name = "device_qualified"
class = "parse-pass"
source = "let d: Tensor<Float16, [B, 1000], device = D>;"

[[case]]
name = "core_rejects_shape_arg"
class = "core-reject"
source = "let x: Tensor<Float32, [B, 3]>;"

[[case]]
name = "core_rejects_model"
class = "core-reject"
source = "model M { input x: Tensor<Float32, [B]>; output y: Tensor<Float32, [B]>; }"

[[case]]
name = "core_rejects_dim_kind"
class = "core-reject"
source = "fn f<B: Dim>(x: Int32) -> Int32 { x }"

[[case]]
name = "core_rejects_float16"
class = "core-reject"
source = "fn f(x: Float16) -> Unit {}"

[[case]]
name = "reserved_named_axes"
class = "reserved-reject"
source = "fn f<B: Dim>(x: Tensor<Float32, [batch: B, 3]>) { }"

[[case]]
name = "reserved_quantized_dtype"
class = "reserved-reject"
source = "fn f(x: Tensor<QInt8<Scale, Zero>, [1]>) { }"

[[case]]
name = "reserved_memory_layout"
class = "reserved-reject"
source = "fn f(x: Tensor<Float32, [1], device = NCHW>) { }"

[[case]]
name = "reserved_training_type"
class = "reserved-reject"
source = "fn f(x: Gradient<Float32>) { }"

[[case]]
name = "reserved_peak_memory"
class = "reserved-reject"
source = "fn f(x: PeakMemory) { }"

[[case]]
name = "reserved_dim_inequality"
class = "reserved-reject"
source = "fn f<B: Dim>(x: Tensor<Float32, [B <= 64]>) { }"

[[case]]
name = "semantic_generic_tensor"
class = "semantic-pass"
source = "fn identity<T: DType, N: Dim, D: Device>(x: Tensor<T, [N], device = D>) -> Tensor<T, [N], device = D> { x }"

[[case]]
name = "semantic_cuda_device"
class = "semantic-pass"
source = "fn gpu(x: Tensor<Float32, [1], device = Cuda<0>>) { }"

[[case]]
name = "semantic_polynomial_identity"
class = "semantic-pass"
source = "fn poly<B: Dim, H: Dim>(x: Tensor<Float32, [B * (H + 1)]>) -> Tensor<Float32, [B * H + B]> { x }"

[[case]]
name = "semantic_shape_mismatch"
class = "semantic-error"
errors = "E0212"
source = "fn bad(x: Tensor<Float32, [4]>) -> Tensor<Float32, [5]> { x }"

[[case]]
name = "semantic_invalid_device"
class = "semantic-error"
errors = "E0211"
source = "fn bad(x: Tensor<Float32, [1], device = String>) { }"

[[case]]
name = "semantic_dim_in_type_position"
class = "semantic-error"
errors = "E0211"
source = "fn bad<B: Dim>(x: B) { }"

[[case]]
name = "semantic_mixed_dim_bound"
class = "semantic-error"
errors = "E0211"
source = "fn bad<B: Dim + Copy>(x: Int32) { }"

[[case]]
name = "semantic_tensor_arity"
class = "semantic-error"
errors = "E0211"
source = "fn bad(x: TensorAny<Int32>) { }"

[[case]]
name = "semantic_move_ownership"
class = "semantic-error"
errors = "E0100"
source = "fn bad(x: Tensor<Float32, [4]>) { let first = x; let second = x; }"

[[case]]
name = "semantic_refine_existential"
class = "semantic-pass"
source = "fn accept<N: Dim>(x: Tensor<UInt8, [N, 3]>) { } fn handle(request: TensorAny) -> Result<Int32, String> { let images = request.refine::<UInt8, [B, 3]>()?; accept(images); Ok(0) }"

[[case]]
name = "semantic_generic_calls"
class = "semantic-pass"
source = "fn identity<T: DType, N: Dim>(x: Tensor<T, [N]>) -> Tensor<T, [N]> { x } fn calls(a: Tensor<Float32, [4]>, b: Tensor<UInt8, [7]>) { let x: Tensor<Float32, [4]> = identity(a); let y: Tensor<UInt8, [7]> = identity(b); }"

