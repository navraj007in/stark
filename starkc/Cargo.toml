[package]
name = "starkc"
version = "0.1.0"
edition = "2021"
default-run = "starkc"
description = "Compiler for the STARK Core v1 language"
license = "MIT"
rust-version = "1.85"

[dependencies]
# Deliberately empty through M4.4 (PLAN.md T3): dependencies are added when a
# work package needs them, not speculatively. The ONNX decoder dependency is
# introduced in M4.5, where it is first consumed. See starkc/docs/gate4-design.md
# for the decoder evaluation (protoc-at-build-time is rejected).

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
